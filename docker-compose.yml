services:
  backend:
    build: ./backend
    ports:
      - "8090:8090"
    volumes:
      - backend-data:/app/data
      - backend-uploads:/app/uploads
    env_file:
      - ./backend/.env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - CHROMA_PERSIST_DIR=/app/data/chroma
      - DATABASE_URL=/app/data/rag_viz.db
      - UPLOAD_DIR=/app/uploads
      - CORS_ORIGINS=http://localhost,http://localhost:3000
    depends_on:
      - ollama
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    # After first start, run: docker exec -it rag_vizualisation-ollama-1 ollama pull nomic-embed-text

volumes:
  backend-data:
  backend-uploads:
  ollama-data:
